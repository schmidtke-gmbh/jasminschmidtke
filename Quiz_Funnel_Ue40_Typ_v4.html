<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Welche Ü40-Frau bist du wirklich? · Jasmin Schmidtke</title>
<meta name="description" content="In 3 Minuten zu deinem persönlichen Ü40-Typ – mit Energie-Plan und Blutwerte-PDF.">
<meta property="og:title" content="Welche Ü40-Frau bist du wirklich?">
<meta property="og:description" content="15 Fragen, 4 Typen, dein persönliches Ergebnis. Plus die 12 wichtigsten Blutwerte ab Ü40 als PDF.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500;1,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Original-Tokens von jasminschmidtke.de */
    --bg:           #FBF7F4;       /* Cream BG · exakt */
    --bg-soft:      #F2EBE3;       /* leicht wärmer */
    --bg-deep:      #E8E0D8;
    --pill:         #ECE4DA;
    --border:       #DDD6CE;

    --ink:          #2D2B30;       /* dunkles Anthrazit · exakt */
    --ink-soft:     #5A5550;
    --ink-body:     #4D4D4D;
    --ink-faint:    #808080;       /* Muted · exakt */

    --taupe:        #BFA492;       /* Accent · "Frauen ab 40" italic */
    --taupe-deep:   #A88B78;
    --sage:         #6B8C5A;       /* Button-Grün · exakt */
    --sage-deep:    #5C7A4D;
    --sage-soft:    #E2EAD8;

    /* Type colors */
    --type-f:       #C2604A;       /* Feuerseele · Coral */
    --type-m:       #5E5E8E;       /* Mondwandlerin · Indigo */
    --type-t:       #A87B9F;       /* Tieffühlende · Dusty Rose */
    --type-w:       #6B8C5A;       /* Wandlerin · Sage Green (match Jasmin) */

    --shadow:       0 4px 18px rgba(45,43,48,.06), 0 1px 3px rgba(45,43,48,.04);
    --shadow-lg:    0 12px 40px rgba(45,43,48,.10), 0 2px 6px rgba(45,43,48,.04);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Poppins',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.55;
    font-size:16px;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    position:relative;
  }
  /* Verschwommener Grid-Hintergrund — fixed, leicht geblurrt, mit Vignette */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(to right, rgba(150,130,110,.18) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(150,130,110,.18) 1px, transparent 1px);
    background-size:72px 72px;
    filter:blur(.8px);
    /* Radiale Maske: Grid in der Mitte am stärksten, an den Rändern weicher */
    -webkit-mask-image:radial-gradient(ellipse 80% 70% at center, rgba(0,0,0,.85) 30%, rgba(0,0,0,.4) 70%, transparent 100%);
            mask-image:radial-gradient(ellipse 80% 70% at center, rgba(0,0,0,.85) 30%, rgba(0,0,0,.4) 70%, transparent 100%);
    z-index:-1;
    pointer-events:none;
  }
  h1,h2,h3{
    font-family:'Playfair Display',Georgia,serif;
    color:var(--ink);
    font-weight:700;
    letter-spacing:normal;
    line-height:1.1;
    margin:0;
  }
  em, .italic-accent{
    color:var(--taupe);
    font-style:italic;
    font-weight:500;
  }
  .italic-accent{
    font-family:'Playfair Display',serif;
    font-style:italic;
    color:var(--taupe);
    font-weight:500;
  }

  .container{
    max-width:1140px;
    margin:0 auto;
    padding:24px 28px 56px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  /* Alle nicht-Hero-Screens behalten ihre schmale max-width */
  .screen.active:not(.hero){
    max-width:680px;
    margin:0 auto;
    width:100%;
  }

  /* ============ BRAND MARK ============ */
  .brand-mark{
    text-align:center;
    margin-bottom:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
  }
  @media (min-width:920px){
    .brand-mark{
      text-align:left;
      justify-content:flex-start;
      margin-bottom:32px;
    }
  }
  .brand-mark .logo{
    width:34px;
    height:34px;
    color:var(--taupe);
    flex-shrink:0;
  }
  .brand-mark .name{
    font-family:'Playfair Display',serif;
    font-size:17px;
    color:var(--ink);
    line-height:1.05;
    font-weight:700;
    text-align:left;
  }
  .brand-mark .name span{
    display:block;
    font-family:'Playfair Display',serif;
    font-size:11px;
    color:var(--ink-soft);
    font-weight:500;
    letter-spacing:.04em;
    margin-top:2px;
  }

  /* ============ SCREEN ============ */
  .screen{
    display:none;
    flex:1;
    flex-direction:column;
    animation:fadeIn .4s ease;
  }
  .screen.active{display:flex}
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* ============ HERO — Mobile: zentriert, Desktop: 2-Col linksbündig ============ */
  /* Mobile-First Default: zentriert */
  .screen.active.hero{
    text-align:center;
    padding-top:14px;
    display:flex;
    flex-direction:column;
    gap:28px;
    align-items:center;
  }
  .hero-text{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    max-width:580px;
  }
  .hero-text h1{text-align:center}
  .hero-text .lead{
    text-align:center;
    margin:0 auto;
    max-width:520px;
  }
  .hero-text .meta-row{
    justify-content:center;
    margin:0 auto;
  }
  .hero-text .pill,
  .hero-text .btn{align-self:center}
  .hero-text .social-proof{text-align:center;margin:0 auto}
  .hero-visual{
    display:flex;
    justify-content:center;
    width:100%;
    max-width:540px;
  }
  .hero-visual .result-preview{margin:0 auto}

  /* Desktop: 2-Col Grid, linksbündig */
  @media (min-width:920px){
    .screen.active.hero{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      column-gap:56px;
      align-items:center;
      text-align:left;
      padding-top:48px;
    }
    .hero-text{max-width:none;align-items:flex-start}
    .hero-text h1{text-align:left}
    .hero-text .lead{
      text-align:left;
      margin:0;
      max-width:100%;
    }
    .hero-text .meta-row{justify-content:flex-start;margin:0}
    .hero-text .pill,
    .hero-text .btn{align-self:flex-start}
    .hero-text .social-proof{text-align:left;margin:0}
    .hero-visual{
      max-width:none;
      justify-content:center;
    }
    .hero-visual .result-preview{margin:0}
  }
  .hero .pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 18px;
    background:var(--pill);
    border-radius:50px;
    font-size:.8em;
    color:var(--ink);
    font-weight:500;
    margin-bottom:1.8em;
    align-self:flex-start;
    font-family:'Poppins',sans-serif;
  }
  .hero .pill .sparkle{width:13px;height:13px;color:var(--taupe-deep)}
  .hero h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(1.95rem, 5.5vw, 3.2rem);
    line-height:1.05;
    color:var(--ink);
    margin-bottom:.3em;
    font-weight:700;
    letter-spacing:normal;
  }
  .hero h1 em{font-style:italic;color:var(--taupe);font-weight:700}
  .hero .lead{
    font-family:'Poppins',sans-serif;
    font-size:1.05em;
    line-height:1.55;
    color:var(--ink-body);
    margin:1em auto 2em;
    max-width:540px;
    font-weight:400;
  }

  .types-preview{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    max-width:520px;
    margin:0 auto 1.8em;
  }
  .type-preview{
    background:#fff;
    border-radius:14px;
    padding:14px;
    border:1px solid var(--bg-deep);
    text-align:left;
    display:flex;
    gap:12px;
    align-items:center;
  }
  .type-preview .badge{
    width:60px;
    height:60px;
    border-radius:14px;
    flex-shrink:0;
    overflow:hidden;
    background:var(--bg);
  }
  .type-preview .badge svg{width:34px;height:34px}
  .type-preview .badge .type-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .type-preview.F .badge{background:#FBF4EE}
  .type-preview.M .badge{background:#F4F2F8}
  .type-preview.T .badge{background:#F8F1F4}
  .type-preview.W .badge{background:#F2F4ED}

  /* ============ RESULT-PREVIEW (Hero-Mockup) ============ */
  .result-preview{
    background:#fff;
    border:1px solid var(--border);
    border-radius:22px;
    padding:28px 28px 22px;
    box-shadow:0 18px 50px rgba(45,43,48,.10), 0 3px 8px rgba(45,43,48,.04);
    max-width:520px;
    width:100%;
    margin:0 auto 2em;
    position:relative;
    text-align:left;
  }
  .result-preview .rp-badge{
    position:absolute;
    top:-11px;
    right:18px;
    background:var(--taupe);
    color:#fff;
    font-size:10px;
    letter-spacing:.18em;
    text-transform:uppercase;
    padding:5px 12px;
    border-radius:50px;
    font-weight:600;
    font-family:'Poppins',sans-serif;
  }
  .result-preview .rp-eyebrow{
    text-align:center;
    font-size:10px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--taupe-deep);
    font-weight:600;
    margin-bottom:16px;
    font-family:'Poppins',sans-serif;
  }
  .result-preview .rp-hero{
    text-align:center;
    margin-bottom:18px;
    padding-bottom:18px;
    border-bottom:1px solid var(--border);
  }
  .result-preview .rp-icon-wrap{
    width:70px;
    height:70px;
    margin:0 auto 10px;
    border-radius:16px;
    overflow:hidden;
    filter:blur(3px);
    opacity:.7;
  }
  .result-preview .rp-icon-wrap svg{width:38px;height:38px}
  .result-preview .rp-icon-wrap .type-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .result-preview .rp-label{
    font-size:10px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--ink-faint);
    font-weight:600;
    font-family:'Poppins',sans-serif;
    margin-bottom:4px;
  }
  .result-preview .rp-name{
    font-family:'Playfair Display',serif;
    font-size:22px;
    color:var(--ink);
    font-weight:700;
    line-height:1.1;
  }
  .result-preview .blurred{
    filter:blur(6px);
    user-select:none;
  }
  .result-preview .rp-bars{
    display:flex;
    flex-direction:column;
    gap:9px;
  }
  .result-preview .rp-bar{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .result-preview .rp-bar-icon{
    width:24px;
    height:24px;
    flex-shrink:0;
    border-radius:6px;
    overflow:hidden;
  }
  .result-preview .rp-bar-icon svg{width:100%;height:100%}
  .result-preview .rp-bar-icon .grid-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .result-preview .rp-bar-label{
    font-size:12px;
    flex:0 0 90px;
    color:var(--ink);
    font-weight:500;
    font-family:'Poppins',sans-serif;
  }
  .result-preview .rp-bar-track{
    flex:1;
    height:5px;
    background:var(--bg-soft);
    border-radius:3px;
    overflow:hidden;
  }
  .result-preview .rp-bar-fill{
    height:100%;
    border-radius:3px;
  }
  .result-preview .rp-bar-pct{
    font-size:11px;
    color:var(--ink-soft);
    font-weight:600;
    width:32px;
    text-align:right;
    font-family:'Poppins',sans-serif;
  }
  .result-preview .rp-hint{
    text-align:center;
    margin-top:18px;
    padding-top:14px;
    border-top:1px solid var(--border);
    font-size:11px;
    color:var(--ink-faint);
    font-family:'Poppins',sans-serif;
    letter-spacing:.05em;
  }
  .result-preview .rp-hint b{color:var(--taupe-deep);font-weight:600}
  .type-preview .meta{flex:1;min-width:0}
  .type-preview .meta .name{
    font-family:'Playfair Display',serif;
    font-size:1.1em;
    color:var(--ink);
    font-weight:600;
    line-height:1.1;
    margin-bottom:2px;
  }
  .type-preview .meta .desc{
    font-size:.76em;
    color:var(--ink-soft);
    line-height:1.4;
  }

  .hero .meta-row{
    display:flex;
    justify-content:center;
    gap:24px;
    flex-wrap:wrap;
    font-size:.82em;
    color:var(--ink-soft);
    margin:1em 0 1.6em;
  }
  .hero .meta-row span{display:flex;align-items:center;gap:6px}
  .hero .meta-row b{color:var(--ink);font-weight:600}

  .hero .social-proof{
    font-size:.82em;
    color:var(--ink-soft);
    margin-top:1em;
  }
  .hero .social-proof b{color:var(--ink);font-weight:500}

  /* ============ BUTTON ============ */
  .btn{
    background:var(--sage);
    color:#fff;
    border:none;
    padding:14px 30px;
    border-radius:60px;
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:.01em;
    cursor:pointer;
    box-shadow:0 3px 12px rgba(107,140,90,.22);
    transition:transform .15s, background .2s, box-shadow .2s;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    align-self:center;
  }
  .btn:hover{background:var(--sage-deep);transform:translateY(-2px);box-shadow:0 6px 18px rgba(107,140,90,.32)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;background:var(--ink-faint)}
  .btn .arrow{display:inline-block;transition:transform .2s}
  .btn:hover .arrow{transform:translateX(3px)}

  /* ============ PROGRESS ============ */
  .top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
    padding:0 4px;
  }
  .progress-text{
    font-size:.7em;
    color:var(--ink-soft);
    letter-spacing:.16em;
    text-transform:uppercase;
    font-weight:500;
  }
  .progress-back{
    background:none;
    border:none;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:.78em;
    padding:6px 10px;
    font-family:'Poppins',sans-serif;
  }
  .progress-back:hover{color:var(--taupe-deep)}
  .progress-bar{
    height:5px;
    background:var(--bg-deep);
    border-radius:3px;
    overflow:hidden;
    margin-bottom:32px;
  }
  .progress-fill{
    height:100%;
    background:var(--sage);
    width:0;
    transition:width .5s ease;
    border-radius:3px;
  }

  /* ============ QUESTION ============ */
  .question .q-eyebrow{
    text-align:center;
    font-size:.7em;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--taupe-deep);
    margin-bottom:.8em;
    font-weight:600;
  }
  .question h2{
    font-size:1.85em;
    line-height:1.2;
    color:var(--ink);
    margin-bottom:.4em;
    text-align:center;
    font-weight:600;
  }
  .question h2 em{font-style:italic;color:var(--taupe);font-weight:500}
  .question .q-helper{
    text-align:center;
    font-size:.88em;
    color:var(--ink-soft);
    margin-bottom:1.6em;
  }

  /* Single Choice */
  .answers{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:520px;
    margin:0 auto;
    width:100%;
  }
  .answer{
    background:var(--bg-soft);
    border:1px solid transparent;
    border-radius:18px;
    padding:18px 22px;
    text-align:left;
    cursor:pointer;
    font-family:'Poppins',sans-serif;
    font-size:1em;
    color:var(--ink);
    line-height:1.4;
    transition:all .2s;
    display:flex;
    align-items:center;
    gap:14px;
    font-weight:500;
  }
  .answer:hover{
    border-color:var(--taupe);
    background:#fff;
    transform:translateX(4px);
    box-shadow:var(--shadow);
  }
  .answer .a-text{flex:1;display:flex;flex-direction:column;gap:4px}
  .answer .a-text .a-hint{
    font-size:.82em;
    color:var(--ink-body);
    font-weight:400;
  }

  /* Image Grid */
  .image-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    max-width:520px;
    margin:0 auto;
  }
  .image-card{
    background:#fff;
    border:1px solid var(--bg-deep);
    border-radius:16px;
    padding:18px 16px 18px;
    cursor:pointer;
    text-align:center;
    transition:all .2s;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    font-family:'Poppins',sans-serif;
  }
  .image-card:hover{
    border-color:var(--taupe);
    transform:translateY(-3px);
    box-shadow:var(--shadow-lg);
  }
  .image-card .ic-visual{
    width:82px;
    height:82px;
    border-radius:50%;
    background:var(--bg-soft);
    margin-bottom:2px;
    overflow:hidden;
  }
  .image-card .ic-visual svg{width:42px;height:42px;margin:20px}
  .image-card .ic-visual .grid-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .image-card .ic-title{
    font-family:'Playfair Display',serif;
    font-size:1.18em;
    color:var(--ink);
    font-weight:600;
    line-height:1.2;
  }
  .image-card .ic-desc{
    font-size:.82em;
    color:var(--ink-soft);
    line-height:1.4;
    font-weight:300;
  }

  /* Slider Image Stage — Illustration ändert sich mit Slider-Wert (à la MadMuscles) */
  .slider-image-stage{
    position:relative;
    width:240px;
    height:240px;
    margin:0 auto 24px;
    border-radius:20px;
    overflow:hidden;
    background:var(--bg-soft);
  }
  .slider-image-stage .slider-img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    opacity:0;
    transition:opacity .5s ease;
    pointer-events:none;
  }
  .slider-image-stage .slider-img.active{
    opacity:1;
  }
  @media (max-width:540px){
    .slider-image-stage{width:200px;height:200px}
  }

  /* Slider */
  .slider-wrap{
    max-width:520px;
    margin:0 auto;
    width:100%;
    text-align:center;
  }
  .slider-value{
    font-family:'Playfair Display',serif;
    font-size:4.4em;
    color:var(--taupe);
    line-height:1;
    margin-bottom:.05em;
    font-weight:500;
    font-style:italic;
  }
  .slider-label{
    font-size:1em;
    color:var(--ink);
    font-family:'Playfair Display',serif;
    font-style:italic;
    margin-bottom:1.6em;
    min-height:1.5em;
    font-weight:500;
  }
  .range-input{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    height:6px;
    background:var(--bg-deep);
    border-radius:6px;
    outline:none;
    margin-bottom:14px;
  }
  .range-input::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:28px;
    height:28px;
    border-radius:50%;
    background:var(--sage);
    border:3px solid #fff;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(107,133,81,.3);
    transition:transform .1s;
  }
  .range-input::-webkit-slider-thumb:hover{transform:scale(1.15)}
  .range-input::-moz-range-thumb{
    width:24px;
    height:24px;
    border-radius:50%;
    background:var(--sage);
    border:3px solid #fff;
    cursor:pointer;
  }
  .range-edges{
    display:flex;
    justify-content:space-between;
    font-size:.76em;
    color:var(--ink-soft);
    margin-bottom:2em;
  }

  /* Multi-Select */
  .multi-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    max-width:520px;
    margin:0 auto 1.6em;
  }
  .multi-card{
    background:var(--bg-soft);
    border:1px solid transparent;
    border-radius:16px;
    padding:16px 20px;
    cursor:pointer;
    font-size:.95em;
    color:var(--ink);
    line-height:1.4;
    transition:all .2s;
    display:flex;
    align-items:center;
    gap:12px;
    font-family:'Poppins',sans-serif;
    text-align:left;
    font-weight:500;
  }
  .multi-card .check{
    width:20px;
    height:20px;
    border-radius:5px;
    border:1.5px solid var(--bg-deep);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    transition:all .2s;
  }
  .multi-card.selected{
    border-color:var(--sage);
    background:var(--sage-soft);
  }
  .multi-card.selected .check{
    background:var(--sage);
    border-color:var(--sage);
  }
  .multi-card.selected .check::after{
    content:'';
    width:5px;
    height:9px;
    border:solid #fff;
    border-width:0 2px 2px 0;
    transform:rotate(45deg) translate(-1px,-1px);
  }
  .multi-card:hover{
    border-color:var(--taupe);
  }
  .multi-helper{
    text-align:center;
    font-size:.8em;
    color:var(--ink-soft);
    margin-top:1em;
  }

  /* Name Input */
  .name-screen{
    text-align:center;
    padding-top:30px;
  }
  .name-screen .greet-icon{
    width:60px;
    height:60px;
    margin:0 auto 1em;
    color:var(--taupe);
  }
  .name-screen h2{
    font-size:2em;
    color:var(--ink);
    margin-bottom:.4em;
    font-weight:600;
  }
  .name-screen h2 em{font-style:italic;color:var(--taupe);font-weight:500}
  .name-screen .lead{
    font-size:1em;
    color:var(--ink-soft);
    margin:.6em auto 1.6em;
    max-width:440px;
    line-height:1.6;
  }
  .input-field{
    width:100%;
    max-width:380px;
    padding:14px 22px;
    border:1px solid var(--bg-deep);
    border-radius:50px;
    font-size:.96em;
    font-family:'Poppins',sans-serif;
    background:#fff;
    color:var(--ink);
    margin-bottom:14px;
    text-align:center;
    transition:border-color .2s, box-shadow .2s;
  }
  .input-field:focus{
    outline:none;
    border-color:var(--sage);
    box-shadow:0 0 0 3px var(--sage-soft);
  }

  /* Interludes */
  .interlude{
    text-align:center;
    padding:30px 0;
  }
  .interlude .stat-big{
    font-family:'Playfair Display',serif;
    font-size:5.5em;
    color:var(--taupe);
    line-height:.95;
    font-style:italic;
    font-weight:500;
    margin-bottom:.1em;
  }
  .interlude .stat-label{
    font-family:'Playfair Display',serif;
    font-size:1.45em;
    color:var(--ink);
    line-height:1.3;
    max-width:480px;
    margin:.4em auto 1.6em;
    font-weight:500;
  }
  .interlude .stat-label em{font-style:italic;color:var(--taupe)}
  .interlude .stat-sub{
    color:var(--ink-soft);
    font-size:.94em;
    max-width:440px;
    margin:0 auto 2em;
    line-height:1.6;
  }
  .interlude .stat-sub b{color:var(--ink);font-weight:600}

  .testimonial{
    background:#fff;
    border-radius:18px;
    padding:24px 26px;
    box-shadow:var(--shadow);
    max-width:520px;
    margin:0 auto 1.6em;
    text-align:left;
    border-left:3px solid var(--taupe);
  }
  .testimonial .quote{
    font-family:'Playfair Display',serif;
    font-size:1.18em;
    color:var(--ink);
    line-height:1.5;
    font-style:italic;
    margin-bottom:.8em;
    font-weight:500;
  }
  .testimonial .author{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:.84em;
    color:var(--ink-soft);
  }
  .testimonial .avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    background:var(--bg-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--taupe-deep);
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-weight:600;
    font-size:1em;
    flex-shrink:0;
  }
  .testimonial .author b{color:var(--ink);font-weight:600}

  /* Loading */
  .loading{
    text-align:center;
    padding:60px 20px;
  }
  .loading h2{
    font-size:1.7em;
    color:var(--ink);
    margin-bottom:1em;
    font-family:'Playfair Display',serif;
    font-weight:600;
  }
  .loading h2 em{font-style:italic;color:var(--taupe);font-weight:500}
  .loader-ring{
    width:64px;
    height:64px;
    border:3px solid var(--bg-deep);
    border-top:3px solid var(--sage);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 1.6em;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-cycle{
    color:var(--ink-soft);
    font-style:italic;
    font-family:'Playfair Display',serif;
    font-size:1.2em;
    min-height:1.6em;
    transition:opacity .4s;
    font-weight:500;
  }
  .loading-progress{
    max-width:300px;
    margin:1.6em auto 0;
    height:4px;
    background:var(--bg-deep);
    border-radius:3px;
    overflow:hidden;
  }
  .loading-progress-fill{
    height:100%;
    background:var(--sage);
    width:0;
    transition:width 4s linear;
    border-radius:3px;
  }
  .loading-quote{
    margin-top:2.4em;
    padding:18px 22px;
    background:#fff;
    border-radius:14px;
    max-width:440px;
    margin-left:auto;
    margin-right:auto;
    font-size:.92em;
    color:var(--ink);
    font-style:italic;
    line-height:1.55;
    font-family:'Playfair Display',serif;
    border-left:3px solid var(--taupe);
    text-align:left;
  }
  .loading-quote .src{
    display:block;
    margin-top:8px;
    font-size:.78em;
    color:var(--ink-soft);
    font-style:normal;
    letter-spacing:.05em;
    font-family:'Poppins',sans-serif;
    font-weight:500;
  }

  /* ============ PETAL-RAIN (Blütenregen während Email-Gate) ============ */
  .petal-stage{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:5;
  }
  .petal{
    position:absolute;
    top:-40px;
    animation:petalFall linear forwards;
    will-change:transform;
  }
  .petal svg{
    width:100%;
    height:100%;
    display:block;
  }
  @keyframes petalFall{
    0%   { transform:translateY(0) translateX(0) rotate(0deg); }
    50%  { transform:translateY(50vh) translateX(calc(var(--drift, 0px) * 0.5)) rotate(calc(var(--rot, 180deg) * 0.5)); }
    100% { transform:translateY(110vh) translateX(var(--drift, 0px)) rotate(var(--rot, 360deg)); }
  }

  /* ============ SPARKLE-PARTIKEL (Reveal-Animation) ============ */
  .sparkle-stage{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:visible;
    z-index:50;
  }
  .sparkle-particle{
    position:absolute;
    pointer-events:none;
    animation:sparkleRise 3.2s ease-out forwards;
    opacity:0;
  }
  .sparkle-particle svg{
    width:100%;
    height:100%;
    display:block;
  }
  @keyframes sparkleRise{
    0%   { opacity:0; transform:translateY(20px) rotate(0deg) scale(.4); }
    15%  { opacity:1; transform:translateY(0) rotate(45deg) scale(1); }
    100% { opacity:0; transform:translateY(-260px) rotate(220deg) scale(.6); }
  }

  /* Pulse-Animation für Type-Icon beim Reveal */
  @keyframes typeBloom{
    0%   { transform:scale(.7); opacity:0; }
    60%  { transform:scale(1.08); opacity:1; }
    100% { transform:scale(1); opacity:1; }
  }
  .rev-result.revealed .type-hero-icon{
    animation:typeBloom 1.1s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  /* ============ SOUND-TOGGLE ============ */
  .sound-toggle{
    position:fixed;
    bottom:18px;
    right:18px;
    width:42px;
    height:42px;
    border-radius:50%;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1px solid var(--border);
    color:var(--ink-soft);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    box-shadow:0 4px 14px rgba(45,43,48,.08);
    transition:all .2s;
  }
  .sound-toggle:hover{
    color:var(--taupe-deep);
    transform:scale(1.08);
  }
  .sound-toggle svg{width:18px;height:18px}
  .sound-toggle .icon-off{display:none}
  .sound-toggle.muted .icon-on{display:none}
  .sound-toggle.muted .icon-off{display:block}
  .sound-toggle.muted{color:var(--ink-faint)}

  /* ============ REVEAL-SCREEN (Backstage-Pattern à la STARK) ============ */
  .reveal-screen{position:relative;padding-top:0}
  .rev-result{
    filter:blur(12px);
    opacity:.55;
    pointer-events:none;
    user-select:none;
    transition:filter 1s ease, opacity .8s ease;
  }
  .rev-result.revealed{
    filter:blur(0);
    opacity:1;
    pointer-events:auto;
    user-select:auto;
  }
  .rev-modal-wrap{
    position:absolute;
    top:30px;
    left:0;
    right:0;
    z-index:10;
    display:flex;
    justify-content:center;
    padding:0 14px;
    transition:opacity .5s ease, transform .5s ease;
  }
  .rev-modal-wrap.fading{
    opacity:0;
    transform:translateY(-24px);
    pointer-events:none;
  }
  .rev-modal{
    background:#fff;
    border-radius:22px;
    padding:30px 28px;
    box-shadow:0 30px 80px rgba(45,43,48,.18), 0 6px 18px rgba(45,43,48,.06);
    max-width:460px;
    width:100%;
    text-align:center;
    border:1px solid var(--border);
  }
  .ready-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:6px 16px;
    background:var(--sage-soft);
    color:var(--sage-deep);
    border-radius:50px;
    font-size:12px;
    font-weight:600;
    letter-spacing:.04em;
    font-family:'Poppins',sans-serif;
    margin-bottom:8px;
  }
  .ready-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--sage);
    animation:readyPulse 1.6s ease infinite;
  }
  @keyframes readyPulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.4;transform:scale(.75)}
  }
  .ready-sub{
    font-size:13px;
    color:var(--sage-deep);
    margin-bottom:18px;
    font-family:'Poppins',sans-serif;
    font-weight:500;
  }
  .rev-modal h2{
    font-family:'Playfair Display',serif;
    font-size:1.85em;
    color:var(--ink);
    font-weight:700;
    line-height:1.1;
    margin-bottom:.4em;
  }
  .rev-modal h2 em{color:var(--taupe);font-style:italic;font-weight:700}
  .modal-lead{
    font-family:'Poppins',sans-serif;
    font-size:.95em;
    color:var(--ink-body);
    line-height:1.55;
    max-width:380px;
    margin:0 auto 1.2em;
  }
  .modal-lead b{color:var(--ink);font-weight:600}
  .rev-modal .bonus-callout{margin:1em auto 1.2em;max-width:none}
  .rev-modal .email-form{max-width:none}
  .rev-modal .email-form .btn{width:100%;margin-top:6px}
  .modal-privacy{
    font-size:.76em;
    color:var(--ink-faint);
    margin-top:1.2em;
    line-height:1.5;
    font-family:'Poppins',sans-serif;
  }
  .modal-privacy a{color:var(--taupe-deep);text-decoration:underline}

  /* Email Gate (Legacy-Styles, falls noch verwendet) */
  .email-screen{text-align:center;padding-top:24px}
  .email-screen .gate-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 18px;
    background:var(--sage-soft);
    border-radius:50px;
    font-size:.78em;
    color:var(--sage-deep);
    font-weight:500;
    margin-bottom:1.4em;
    align-self:center;
  }
  .email-screen .gate-pill .sparkle{width:13px;height:13px;color:var(--sage)}
  .email-screen h1{
    font-size:2.2em;
    color:var(--ink);
    margin-bottom:.4em;
    font-weight:700;
  }
  .email-screen h1 em{font-style:italic;color:var(--taupe);font-weight:500}
  .email-screen .lead{
    color:var(--ink-soft);
    font-size:1em;
    margin:.5em auto 1.4em;
    max-width:480px;
    line-height:1.6;
  }
  .email-form{max-width:420px;margin:0 auto;width:100%}
  .email-form .input-field{
    text-align:left;
    max-width:none;
    width:100%;
  }
  .email-form .btn{width:100%;justify-content:center;margin-top:6px}
  .privacy{
    font-size:.78em;
    color:var(--ink-soft);
    margin-top:1.2em;
    line-height:1.5;
  }
  .privacy a{color:var(--taupe-deep);text-decoration:underline}
  .bonus-callout{
    background:var(--bg-soft);
    border-radius:14px;
    padding:14px 18px;
    margin:1.2em auto 1em;
    max-width:440px;
    text-align:left;
    border-left:3px solid var(--taupe);
    display:flex;
    gap:12px;
    align-items:center;
  }
  .bonus-callout .gift-icon{
    width:30px;
    height:30px;
    color:var(--taupe-deep);
    flex-shrink:0;
  }
  .bonus-callout strong{
    display:block;
    font-size:.7em;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--taupe-deep);
    font-weight:700;
    margin-bottom:3px;
  }
  .bonus-callout span{
    color:var(--ink);
    font-family:'Playfair Display',serif;
    font-size:1em;
    font-style:italic;
    line-height:1.3;
    display:block;
    font-weight:500;
  }

  /* Result */
  .result{
    background:#fff;
    border-radius:18px;
    padding:36px 32px;
    box-shadow:var(--shadow-lg);
    margin-bottom:24px;
    border-top:6px solid var(--taupe);
  }
  .type-hero-icon{
    width:120px;
    height:120px;
    border-radius:22px;
    margin:0 auto 1.2em;
    overflow:hidden;
    background:var(--bg-soft);
  }
  .type-hero-icon svg{
    width:54px;
    height:54px;
  }
  .type-hero-icon .type-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .result .type-eyebrow{
    text-align:center;
    font-size:.7em;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:var(--taupe-deep);
    margin-bottom:1em;
    font-weight:600;
  }
  .result .type-name{
    text-align:center;
    font-family:'Playfair Display',serif;
    font-size:2.5em;
    color:var(--ink);
    line-height:1.1;
    margin-bottom:.2em;
    font-weight:700;
  }
  .result .type-name em{font-style:italic;color:var(--taupe);font-weight:500}
  .result .type-tagline{
    text-align:center;
    font-family:'Playfair Display',serif;
    font-size:1.2em;
    color:var(--ink-soft);
    margin-bottom:1.6em;
    font-style:italic;
    font-weight:500;
  }
  .result .description{
    color:var(--ink);
    font-size:.96em;
    line-height:1.7;
    margin-bottom:1.4em;
  }
  .result .description b{color:var(--ink);font-weight:600}
  .result h3{
    font-family:'Poppins',sans-serif !important;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.1em;
    font-size:.7em;
    color:var(--taupe-deep);
    margin:1.6em 0 .8em;
  }
  .result ul{list-style:none;padding:0;margin:0 0 1.5em}
  .result ul li{
    padding:8px 0 8px 26px;
    position:relative;
    line-height:1.55;
    color:var(--ink);
    font-size:.94em;
  }
  .result ul li::before{
    content:'';
    position:absolute;
    left:6px;
    top:14px;
    width:8px;
    height:8px;
    border:1.5px solid var(--taupe);
    border-radius:50%;
  }
  .result .score-bars{
    background:var(--bg-soft);
    border-radius:12px;
    padding:18px 20px;
    margin:1em 0 1.4em;
  }
  .score-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .score-row:last-child{margin-bottom:0}
  .score-row .lbl{
    flex:0 0 90px;
    font-size:.82em;
    color:var(--ink);
    font-weight:500;
  }
  .score-row .bar-wrap{
    flex:1;
    height:8px;
    background:#fff;
    border-radius:4px;
    overflow:hidden;
  }
  .score-row .bar{
    height:100%;
    border-radius:4px;
    transition:width .8s ease;
  }
  .score-row .pct{
    flex:0 0 36px;
    font-size:.78em;
    color:var(--ink-soft);
    text-align:right;
    font-weight:500;
  }

  /* Blutwerte-Disclaimer-Box */
  .data-disclaimer{
    background:var(--bg-soft);
    border-radius:14px;
    padding:18px 20px;
    margin:1.6em 0 .4em;
    display:flex;
    gap:14px;
    align-items:flex-start;
    border-left:3px solid var(--taupe);
  }
  .data-disclaimer .dd-icon{
    width:24px;
    height:24px;
    color:var(--taupe-deep);
    flex-shrink:0;
    margin-top:2px;
  }
  .data-disclaimer .dd-icon svg{width:100%;height:100%}
  .data-disclaimer .dd-body strong{
    display:block;
    font-size:.7em;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--taupe-deep);
    font-weight:700;
    margin-bottom:6px;
  }
  .data-disclaimer .dd-body p{
    margin:0;
    font-size:.92em;
    line-height:1.6;
    color:var(--ink);
  }
  .data-disclaimer .dd-body b{color:var(--ink);font-weight:600}

  /* Pitch */
  .pitch{
    background:var(--ink);
    color:#fff;
    border-radius:18px;
    padding:34px 28px;
    text-align:center;
  }
  .pitch h3{
    font-family:'Playfair Display',serif !important;
    font-size:1.7em !important;
    color:#fff !important;
    margin:0 0 .5em !important;
    text-transform:none !important;
    letter-spacing:0 !important;
    font-weight:600;
  }
  .pitch h3 em{font-style:italic;color:var(--taupe);font-weight:500}
  .pitch p{
    color:rgba(255,255,255,.85);
    font-size:.94em;
    margin:0 0 1.4em;
    line-height:1.6;
  }
  .pitch p b{color:#fff;font-weight:600}
  .pitch .btn{
    background:var(--sage);
    color:#fff;
  }
  .pitch .btn:hover{background:var(--sage-deep)}
  .pitch .small{
    display:block;
    margin-top:1.1em;
    font-size:.8em;
    color:rgba(255,255,255,.6);
    font-style:italic;
    font-family:'Playfair Display',serif;
  }

  .footer{
    text-align:center;
    margin-top:32px;
    font-size:.8em;
    color:var(--ink-soft);
    line-height:1.6;
  }
  .footer a{color:var(--taupe-deep);font-weight:500}

  .continue-bar{
    margin-top:1.8em;
    text-align:center;
  }

  /* Mobile */
  @media (max-width:540px){
    .container{padding:18px 16px 32px}
    .hero h1{font-size:2em}
    .hero .lead{font-size:.95em}
    .types-preview{grid-template-columns:1fr}
    .question h2{font-size:1.4em}

    /* Kompaktere Cards auf Mobile — mehr Inhalt sichtbar */
    .answer{padding:14px 16px;font-size:.93em;gap:12px;border-radius:14px}
    .answer .a-text .a-hint{font-size:.78em}
    .multi-card{padding:13px 14px;font-size:.9em;gap:10px;border-radius:13px}
    .multi-card .check{width:18px;height:18px}

    .image-grid{gap:10px}
    .image-card{padding:14px 10px}
    .image-card .ic-visual{width:64px;height:64px}
    .image-card .ic-visual svg{width:34px;height:34px}
    .image-card .ic-title{font-size:1.02em}
    .image-card .ic-desc{font-size:.78em}
    .multi-grid{grid-template-columns:1fr;gap:7px}
    .slider-value{font-size:3.4em}
    .interlude .stat-big{font-size:3.8em}
    .interlude .stat-label{font-size:1.18em}
    .result{padding:28px 22px}
    .result .type-name{font-size:1.95em}
    .pitch{padding:28px 22px}
    .pitch h3{font-size:1.4em !important}
    .email-screen h1{font-size:1.8em}

    /* Sticky Continue-Button für Multi-Select (lange Listen) */
    .question .continue-bar{
      position:sticky;
      bottom:0;
      padding:14px 0 8px;
      background:linear-gradient(to bottom, rgba(251,247,244,0) 0%, var(--bg) 30%, var(--bg) 100%);
      margin-top:1em;
      z-index:20;
    }
    .multi-helper{font-size:.78em}
  }
</style>
</head>
<body>

<div class="container">

   SOUND-MODUL · Web Audio API, keine MP3-Files nötig
   Sounds passend zur Ü40-Zielgruppe: weich, warm, glockenähnlich
   ============================================================ */

/* Pentatonik-Pools — jeder Ton aus diesen Pools klingt harmonisch zu allen anderen.
   Wir variieren zwischen den Klicks, damit's nie nervig wird. */
const TONES_CLICK = [
  261.63,  // C4
  293.66,  // D4
  329.63,  // E4
  392.00,  // G4
  440.00,  // A4
  523.25   // C5
];

const TONES_SUBMIT = [
  { lo: 220.00, hi: 329.63 },  // A3 → E4 (Quinte, warm tief)
  { lo: 261.63, hi: 392.00 },  // C4 → G4 (Quinte)
  { lo: 293.66, hi: 440.00 },  // D4 → A4 (Quinte)
  { lo: 329.63, hi: 523.25 },  // E4 → C5 (Sext)
  { lo: 261.63, hi: 329.63 },  // C4 → E4 (Terz)
  { lo: 293.66, hi: 392.00 },  // D4 → G4 (Quart)
  { lo: 329.63, hi: 440.00 },  // E4 → A4 (Quart)
  { lo: 392.00, hi: 523.25 }   // G4 → C5 (Quart)
];

const sound = {
  enabled: true,
  ctx: null,
  _lastSlider: 0,
  _lastClickIdx: -1,
  _lastSubmitIdx: -1,

  init() {
    if (!this.ctx) {
      try {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) { this.enabled = false; }
    }
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  },

  /* Warmer, sehr weicher Ton — pure Sinuswelle + dezente Oktave,
     stark tiefpass-gefiltert (1000 Hz). Klingt fast wie ein gedämpftes
     Atemgeräusch / Hauch. Keine Obertöne, kein digitaler Charakter. */
  tone(freq, duration, volume, delay) {
    if (!this.enabled || !this.ctx) return;
    const t0 = this.ctx.currentTime + (delay || 0);

    // Sehr starkes Tiefpass-Filtering — entfernt allen Höhenanteil
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 1000;
    filter.Q.value = 0.5;

    // Master-Gain: 80 ms Attack (sehr sanft), langes Decay
    const master = this.ctx.createGain();
    master.gain.value = 0;
    master.gain.linearRampToValueAtTime(volume, t0 + 0.08);
    master.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);

    filter.connect(master);
    master.connect(this.ctx.destination);

    // Pure Sinuswelle als Grundton
    const osc1 = this.ctx.createOscillator();
    osc1.type = 'sine';
    osc1.frequency.value = freq;
    const g1 = this.ctx.createGain();
    g1.gain.value = 1;
    osc1.connect(g1);
    g1.connect(filter);
    osc1.start(t0);
    osc1.stop(t0 + duration + 0.15);

    // Subtile Oktave (-22 dB) für minimale Wärme, ohne synthetischen Klang
    const osc2 = this.ctx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2;
    const g2 = this.ctx.createGain();
    g2.gain.value = 0.08;
    osc2.connect(g2);
    g2.connect(filter);
    osc2.start(t0);
    osc2.stop(t0 + duration + 0.15);
  },

  // Hilfs-Funktion: zufälliger Index, der nicht der letzte ist
  _pickIdx(poolLength, lastIdx) {
    if (poolLength <= 1) return 0;
    let idx;
    do {
      idx = Math.floor(Math.random() * poolLength);
    } while (idx === lastIdx);
    return idx;
  },

  // Antwort wählen: pentatonik-Ton, immer unterschiedlich zur letzten Wahl
  click() {
    this.init();
    const idx = this._pickIdx(TONES_CLICK.length, this._lastClickIdx);
    this._lastClickIdx = idx;
    this.tone(TONES_CLICK[idx], 0.7, 0.05);
  },

  // Weiter: zwei harmonische Töne (Pentatonik-Paare), variiert pro Klick
  submit() {
    this.init();
    const idx = this._pickIdx(TONES_SUBMIT.length, this._lastSubmitIdx);
    this._lastSubmitIdx = idx;
    const motif = TONES_SUBMIT[idx];
    this.tone(motif.lo, 1.1, 0.05);
    this.tone(motif.hi, 1.3, 0.04, 0.20);
  },

  // Result-Reveal: ruhige Bass-zu-Höhe-Kaskade, fast meditativ
  reveal() {
    this.init();
    this.tone(220, 3.5, 0.06);            // A3 — tiefer Grundton
    this.tone(330, 3.2, 0.05, 0.25);      // E4
    this.tone(440, 2.8, 0.04, 0.55);      // A4
    this.tone(660, 2.4, 0.025, 0.95);     // E5 — leichter Schimmer
  },

  /* Woosh — weicher Wind-Sound für Testimonial / Zitat-Einblendung.
     Gefilterte Rosa-Rausch-Schleife mit Bandpass-Sweep tief→hoch→tief. */
  woosh(duration, volume) {
    this.init();
    if (!this.enabled || !this.ctx) return;
    duration = duration || 0.9;
    volume = volume || 0.08;
    const t0 = this.ctx.currentTime;

    // Rauschpuffer erzeugen
    const bufferSize = Math.floor(this.ctx.sampleRate * duration);
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }

    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;

    // Bandpass-Filter mit Sweep durch den Frequenzbereich
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.Q.value = 1.0;
    filter.frequency.setValueAtTime(180, t0);
    filter.frequency.exponentialRampToValueAtTime(1400, t0 + duration * 0.45);
    filter.frequency.exponentialRampToValueAtTime(280, t0 + duration);

    // Lautstärke-Hüllkurve: leise rein, ausklingen
    const gain = this.ctx.createGain();
    gain.gain.value = 0;
    gain.gain.linearRampToValueAtTime(volume, t0 + duration * 0.3);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(this.ctx.destination);

    noise.start(t0);
    noise.stop(t0 + duration + 0.05);
  },

  // Slider-Bewegung: minimal hörbarer Hauch, throttled auf 110 ms
  slider(value, max, min) {
    if (!this.enabled) return;
    const now = Date.now();
    if (now - this._lastSlider < 110) return;
    this._lastSlider = now;
    this.init();
    // Höhere Slider-Werte = leicht höherer Ton (440 Hz → 600 Hz)
    const ratio = (value - (min || 0)) / (max - (min || 0));
    const freq = 440 + ratio * 160;
    this.tone(freq, 0.18, 0.018);
  }
};

function toggleSound() {
  sound.enabled = !sound.enabled;
  const btn = document.getElementById('sound-toggle');
  if (btn) btn.classList.toggle('muted', !sound.enabled);
  if (sound.enabled) sound.click(); // Feedback beim Wieder-Aktivieren
}

const SPARKLE_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0L13.5 9.5L24 12L13.5 14.5L12 24L10.5 14.5L0 12L10.5 9.5Z"/></svg>';
const SPARKLE_COLORS = ['#BFA492', '#6B8C5A', '#C99A4E', '#A88B78'];

function spawnSparkles(container, count) {
  if (!container) return;
  count = count || 22;
  // Stage-Container
  const stage = document.createElement('div');
  stage.className = 'sparkle-stage';
  container.style.position = container.style.position || 'relative';
  container.appendChild(stage);

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'sparkle-particle';
      p.innerHTML = SPARKLE_SVG;
      const size = 8 + Math.random() * 10;
      p.style.left = (Math.random() * 100) + '%';
      p.style.bottom = (Math.random() * 40) + 'px';
      p.style.color = SPARKLE_COLORS[Math.floor(Math.random() * SPARKLE_COLORS.length)];
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.animationDuration = (2.4 + Math.random() * 1.4) + 's';
      stage.appendChild(p);
      setTimeout(() => p.remove(), 4000);
    }, i * 70);
  }

  // Stage komplett entfernen nach allen Animationen
  setTimeout(() => stage.remove(), count * 70 + 4500);
}

/* ============================================================
   PETALS · sanfter Blütenregen für Email-Gate
   ============================================================ */

const PETAL_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8 4 6 8 6 12C6 16 8 19 11 21C12 22 13 22 14 20C16 17 18 13 18 9C18 6 16 3 12 2Z" opacity="0.85"/></svg>';
const PETAL_COLORS = ['#BFA492', '#D4BAA6', '#E8C8C5', '#E0CDB8', '#CFB7A4'];

let _petalStopper = null;

function startPetalRain(container) {
  if (!container) return;
  let stage = container.querySelector('.petal-stage');
  if (!stage) {
    stage = document.createElement('div');
    stage.className = 'petal-stage';
    if (getComputedStyle(container).position === 'static') container.style.position = 'relative';
    container.appendChild(stage);
  }

  const spawnPetal = () => {
    if (!document.body.contains(stage)) return;
    const p = document.createElement('div');
    p.className = 'petal';
    p.innerHTML = PETAL_SVG;
    const size = 11 + Math.random() * 15;
    p.style.left = (Math.random() * 100) + '%';
    p.style.color = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.animationDuration = (9 + Math.random() * 6) + 's';
    p.style.opacity = 0.35 + Math.random() * 0.4;
    p.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
    p.style.setProperty('--rot', (180 + Math.random() * 360) + 'deg');
    stage.appendChild(p);
    setTimeout(() => p.remove(), 16000);
  };

  // Initial-Burst: ein paar Petals sofort
  for (let i = 0; i < 6; i++) {
    setTimeout(spawnPetal, i * 250);
  }
  // Kontinuierliches Spawnen
  const interval = setInterval(spawnPetal, 650);

  _petalStopper = () => {
    clearInterval(interval);
    if (stage && stage.parentNode) {
      // Auslaufenlassen — entferne nach 2 s damit fliegende Petals fertig fallen
      setTimeout(() => {
        if (stage.parentNode) stage.remove();
      }, 8000);
    }
    _petalStopper = null;
  };
}

function stopPetalRain() {
  if (_petalStopper) _petalStopper();
}

          <span>${s.edgeRight}</span>
        </div>
        <div class="continue-bar">
          <button class="btn" onclick="submitSlider()">Weiter <span class="arrow">→</span></button>
        </div>
      </div>
    </section>
  `;
}

function renderMulti(s){
  multiSelected = new Set();
  $app().innerHTML = `
    ${progressBar()}
    <section class="screen active question">
      <div class="q-eyebrow">${s.eyebrow}</div>
      <h2>${personalize(s.question)}</h2>
      ${s.helper ? `<p class="q-helper">${s.helper}</p>` : ''}
      <div class="multi-grid" id="multi-grid">
        ${s.options.map((o, i) => `
          <button class="multi-card" data-idx="${i}" onclick="toggleMulti(${i})">
            <span class="check"></span>
            <span>${o.label}</span>
          </button>
        `).join('')}
      </div>
      <p class="multi-helper" id="multi-helper">Wähle mindestens eine Antwort.</p>
      <div class="continue-bar">
        <button class="btn" id="multi-submit" disabled onclick="submitMulti()">Weiter <span class="arrow">→</span></button>
      </div>
    </section>
  `;
}

function renderInterlude(s){
  if (s.variant === 'stat') {
    $app().innerHTML = `
      ${progressBar()}
      <section class="screen active interlude">
        <div class="stat-big">${s.big}</div>
        <div class="stat-label">${personalize(s.label)}</div>
        <div class="stat-sub">${personalize(s.sub)}</div>
        <div class="continue-bar">
          <button class="btn" onclick="next()">Weiter <span class="arrow">→</span></button>
        </div>
      </section>
    `;
  } else if (s.variant === 'testimonial') {
    setTimeout(() => sound.woosh(0.9, 0.07), 100);
    $app().innerHTML = `
      ${progressBar()}
      <section class="screen active interlude">
        <div class="stat-big" style="font-size:3.4em">${s.big}</div>
        <div class="stat-label">${s.label}</div>
        <div class="testimonial">
          <div class="quote">„${s.quote}"</div>
          <div class="author">
            <div class="avatar">${s.initials}</div>
            <div><b>${s.name}</b> · ${s.role}</div>
          </div>
        </div>
        <div class="continue-bar">
          <button class="btn" onclick="next()">Weiter <span class="arrow">→</span></button>
        </div>
      </section>
    `;
  }
}

function renderEmail(){
  // Compute the winner once so the blurred result behind is consistent
  if (!state.user.winner) {
    state.user.winner = Object.entries(state.scores).sort((a,b) => b[1]-a[1])[0][0];
  }

  $app().innerHTML = `
    <section class="screen active reveal-screen">
      <!-- Layer 1: Echtes Ergebnis, verschwommen im Hintergrund -->
      <div class="rev-result" id="rev-result">
        ${buildResultBody()}
      </div>

      <!-- Layer 2: Email-Modal-Gate als Overlay -->
      <div class="rev-modal-wrap" id="rev-modal-wrap">
        <div class="rev-modal">
          <div class="ready-pill">
            <span class="ready-dot"></span>
            Ergebnis bereit
          </div>
          <div class="ready-sub">Deine Sofortmaßnahmen warten auf dich</div>

          <h2>Dein Profil ist <em>fertig</em>${state.user.name ? ', ' + state.user.name : ''}!</h2>
          <p class="modal-lead">
            Trag deine E-Mail ein, um deine <b>3 Sofortmaßnahmen</b> und die <b>12 Blutwerte ab Ü40</b> als PDF freizuschalten.
          </p>

          <div class="bonus-callout">
            <span class="gift-icon">${ICONS.gift}</span>
            <div>
              <strong>Dein Geschenk dazu</strong>
              <span>„Die 12 wichtigsten Blutwerte ab Ü40" – PDF mit Erklärungen</span>
            </div>
          </div>

          <form class="email-form" onsubmit="submitEmail(event)">
            <input type="email" class="input-field" id="user-email" placeholder="deine@email.de" required>
            <button type="submit" class="btn">Mein Ergebnis freischalten <span class="arrow">→</span></button>
          </form>
          <p class="modal-privacy">
            Kein Spam. Nur ehrlicher Mehrwert. Jederzeit abbestellbar.<br/>
            <a href="#">Datenschutz</a> · <a href="#">Impressum</a>
          </p>
        </div>
      </div>
    </section>
  `;

  // Sanfter Blütenregen während des Email-Gates
  setTimeout(() => {
    const screen = document.querySelector('.reveal-screen');
    if (screen) startPetalRain(screen);
  }, 200);
}

function renderLoading(){
  $app().innerHTML = `
    <section class="screen active loading">
      <div class="loader-ring"></div>
      <h2>Wir analysieren deine <em>16 Antworten</em>${state.user.name ? ', ' + state.user.name : ''}…</h2>
      <p class="loading-cycle" id="loading-cycle">Profilachsen werden ausgewertet</p>
      <div class="loading-progress">
        <div class="loading-progress-fill" id="loading-progress-fill"></div>
      </div>
      <div class="loading-quote">
        „Der größte Hebel für Frauen Ü40 ist nicht eine neue Diät. Es ist Verstehen, was im eigenen Körper passiert – und einen Plan zu haben, dem man vertraut."
        <span class="src">— Jasmin Schmidtke</span>
      </div>
    </section>
  `;
  // Progress fill animation
  setTimeout(() => {
    const fill = document.getElementById('loading-progress-fill');
    if (fill) fill.style.width = '100%';
  }, 50);

  // Cycling messages
  const msgs = [
    'Profilachsen werden ausgewertet',
    'Hormon-Signale werden gewichtet',
    'Identitäts-Indikatoren prüfen',
    'Energie-Muster erkennen',
    'Dein persönlicher Typ wird erstellt'
  ];
  let i = 0;
  const el = document.getElementById('loading-cycle');
  const interval = setInterval(() => {
    i++;
    if (i >= msgs.length || !document.getElementById('loading-cycle')) {
      clearInterval(interval);
      return;
    }
    el.style.opacity = 0;
    setTimeout(() => {
      el.textContent = msgs[i];
      el.style.opacity = 1;
    }, 300);
  }, 800);
  setTimeout(() => next(false), 4200);
}

function buildResultBody(){
  if (!state.user.winner) {
    state.user.winner = Object.entries(state.scores).sort((a,b) => b[1]-a[1])[0][0];
  }
  const t = TYPES[state.user.winner];
  const totalScore = Object.values(state.scores).reduce((a,b)=> a+b, 0) || 1;
  const pct = (k) => Math.round((state.scores[k] / totalScore) * 100);

  return `
    <div class="result" style="border-top-color:${t.color}">
      <div class="type-eyebrow">Deine größte Baustelle${state.user.name ? ', ' + state.user.name : ''}</div>
      <div class="type-hero-icon" style="color:${t.color}">${ICONS['type_' + t.short.toLowerCase()]}</div>
      <h2 class="type-name">${t.name.replace(t.short_name, '<em>'+t.short_name+'</em>')}</h2>
      <p class="type-tagline">„${t.tagline}"</p>
      <p class="description">${t.description}</p>

      <h3>Wo deine Blockaden sitzen</h3>
      <div class="score-bars">
        ${Object.entries(TYPES).map(([k, tt]) => `
          <div class="score-row">
            <div class="lbl">${tt.short_name}</div>
            <div class="bar-wrap"><div class="bar" style="width:${pct(k)}%;background:${tt.color}"></div></div>
            <div class="pct">${pct(k)}%</div>
          </div>
        `).join('')}
      </div>

      <h3>Deine 3 Sofortmaßnahmen</h3>
      <ul>${t.needs.slice(0, 3).map(n => `<li>${n}</li>`).join('')}</ul>

      <div class="data-disclaimer">
        <div class="dd-icon">${ICONS.sparkle}</div>
        <div class="dd-body">
          <strong>Wichtig zu wissen</strong>
          <p>Ohne <b>echte Blutwerte</b> bleibt diese Auswertung eine fundierte Vermutung. Die wirkliche Ursache deiner Beschwerden zeigt sich erst, wenn wir <b>Hormone, Vitamin D, Eisen, Schilddrüse &amp; Co.</b> tatsächlich messen. Genau das machen wir im Kurs gemeinsam.</p>
        </div>
      </div>
    </div>

    <div class="pitch">
      <h3>Bereit, das <em>wirklich</em> anzugehen?</h3>
      <p>${t.pitch}</p>
      <p style="margin-bottom:1.6em">Im <b>„Fresh &amp; Attraktiv Ü40"</b>-Kurs gehen wir genau deine Baustelle Schritt für Schritt an – inklusive Anleitung zur Blutanalyse und persönlichem Auswertungs-Call. <b>Setz dich auf die Warteliste</b>, bevor die Plätze weg sind.</p>
      <button class="btn" onclick="goToMasterclass()">Jetzt auf die Warteliste <span class="arrow">→</span></button>
      <span class="small">Nächster Kurs-Start: September 2026 · Begrenzte Plätze</span>
    </div>

    <div class="footer">
      <p>Du hast eine Frage zu deinem Ergebnis? Schreib Jasmin auf Instagram <a href="https://instagram.com/" target="_blank">@jasminschmidtke</a></p>
    </div>
  `;
}

function renderResult(){
  $app().innerHTML = `
    <section class="screen active">
      ${buildResultBody()}
    </section>
  `;
}


/* ============================================================
   ACTIONS
   ============================================================ */

function personalize(text){
  if (!text) return '';
  return text.replace(/\{name\}/g, state.user.name || '');
}

function next(playSound){
  if (playSound !== false) sound.submit();
  state.step++;
  render();
}
function goBack(){
  if (state.step > 0) {
    state.step = Math.max(0, state.step - 1);
    render();
  }
}
function submitName(e){
  e.preventDefault();
  sound.submit();
  state.user.name = document.getElementById('name-input').value.trim();
  next(false);
}
function selectSingle(i){
  const s = STEPS[state.step];
  sound.click();
  applyScores(s.options[i].scores);
  state.answers.push({ step: state.step, choice: i });
  setTimeout(() => next(false), 220);
}
function updateSlider(){
  const s = STEPS[state.step];
  const v = parseInt(document.getElementById('slider-input').value);
  document.getElementById('slider-value').textContent = v;
  document.getElementById('slider-label').textContent = s.labels[v] || '';
  // Sehr leiser Slider-Tick, throttled
  sound.slider(v, s.max, s.min);
  // Bild-Wechsel bei Slidern mit Illustration
  if (s.images && s.images.length === 3) {
    const idx = _sliderImageIdx(v, s.imageThresholds);
    const stage = document.getElementById('slider-image-stage');
    if (stage) {
      stage.querySelectorAll('.slider-img').forEach(img => {
        img.classList.toggle('active', parseInt(img.dataset.idx) === idx);
      });
    }
  }
}
function submitSlider(){
  const s = STEPS[state.step];
  sound.submit();
  const v = parseInt(document.getElementById('slider-input').value);
  applyScores(s.scoreFn(v));
  state.answers.push({ step: state.step, value: v });
  next(false);
}
function toggleMulti(idx){
  const card = document.querySelector(`.multi-card[data-idx="${idx}"]`);
  sound.click();
  if (multiSelected.has(idx)) {
    multiSelected.delete(idx);
    card.classList.remove('selected');
  } else {
    multiSelected.add(idx);
    card.classList.add('selected');
  }
  document.getElementById('multi-submit').disabled = multiSelected.size === 0;
  document.getElementById('multi-helper').textContent =
    multiSelected.size === 0 ? 'Wähle mindestens eine Antwort.' : `${multiSelected.size} ausgewählt`;
}
function submitMulti(){
  const s = STEPS[state.step];
  sound.submit();
  multiSelected.forEach(idx => applyScores(s.options[idx].scores));
  state.answers.push({ step: state.step, choices: Array.from(multiSelected) });
  next(false);
}
function applyScores(scores){
  if (!scores) return;
  for (const [k, v] of Object.entries(scores)) {
    state.scores[k] = (state.scores[k] || 0) + v;
  }
}
function submitEmail(e){
  e.preventDefault();
  state.user.email = document.getElementById('user-email').value.trim();

  /* ============================================================
     >>> INTEGRATIONS-PUNKT FÜR EUREN E-MAIL-ANBIETER <<<
     ============================================================
     Hier eure echte E-Mail-Integration einbauen. Beispiele:

     – ConvertKit (Kit), ActiveCampaign, Brevo, Klaviyo:
       fetch('YOUR_ENDPOINT', {
         method:'POST',
         headers:{'Content-Type':'application/json'},
         body: JSON.stringify({
           email: state.user.email,
           first_name: state.user.name,
           tags:[`Quiz_Typ_${state.user.winner}`]
         })
       });

     Tags Quiz_Typ_F, Quiz_Typ_M, Quiz_Typ_T, Quiz_Typ_W
     ermöglichen typ-spezifische E-Mail-Sequenzen.
     ============================================================ */
  console.log('[Quiz] Lead:', state.user, '· Typ:', state.user.winner, '· Scores:', state.scores);

  // Reveal-Sound (sanfter C-Dur-Akkord, klangschalenähnlich)
  sound.reveal();

  // Petals langsam ausklingen lassen (existierende fallen weiter, keine neuen)
  stopPetalRain();

  // Reveal-Animation: Blur löst sich, Modal fadet weg
  const revResult = document.getElementById('rev-result');
  const revModalWrap = document.getElementById('rev-modal-wrap');

  if (revResult)    revResult.classList.add('revealed');
  if (revModalWrap) revModalWrap.classList.add('fading');

  // Sparkles spawnen auf der Result-Card
  setTimeout(() => {
    if (revResult) spawnSparkles(revResult, 24);
  }, 250);

  // Nach der Animation: Scroll to top damit das Ergebnis sichtbar wird
  setTimeout(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    if (revModalWrap) revModalWrap.style.display = 'none';
  }, 900);
}
function goToMasterclass(){
  /* >>> Hier eure Salespage- oder Warteliste-URL einsetzen <<< */
  window.location.href = '#warteliste';
}

/* ============================================================
   ROUTER
   ============================================================ */
function render(){
  const s = STEPS[state.step];
  if (!s) return;
  switch (s.type) {
    case 'hero':       return renderHero();
    case 'name':       return renderName();
    case 'single':     return renderSingle(s);
    case 'image':      return renderImage(s);
    case 'slider':     return renderSlider(s);
    case 'multi':      return renderMulti(s);
    case 'interlude':  return renderInterlude(s);
    case 'email':      return renderEmail();
    case 'loading':    return renderLoading();
    case 'result':     return renderResult();
  }
  window.scrollTo({ top:0, behavior:'smooth' });
}
render();
</script>
