<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Welche Ü40-Frau bist du wirklich? · Jasmin Schmidtke</title>
<meta name="description" content="In 3 Minuten zu deinem persönlichen Ü40-Typ – mit Energie-Plan und Blutwerte-PDF.">
<meta property="og:title" content="Welche Ü40-Frau bist du wirklich?">
<meta property="og:description" content="15 Fragen, 4 Typen, dein persönliches Ergebnis. Plus die 12 wichtigsten Blutwerte ab Ü40 als PDF.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Cream / Background */
    --bg:           #FAF6F0;
    --bg-soft:      #F2EBDD;
    --bg-deep:      #E8DDC9;
    --pill:         #ECE3D2;

    /* Ink / Text */
    --ink:          #1F1A1B;
    --ink-soft:     #5C5256;
    --ink-faint:    #8A8084;

    /* Brand accents */
    --taupe:        #B5957A;       /* Italic-Akzent */
    --taupe-deep:   #95775E;
    --sage:         #6B8551;       /* CTA Button */
    --sage-deep:    #587140;
    --sage-soft:    #DCE5D2;

    /* Type colors */
    --type-e:       #B84A62;
    --type-h:       #C99A4E;
    --type-i:       #3D2C35;
    --type-r:       #6B8551;

    /* Effects */
    --shadow:       0 4px 18px rgba(31,26,27,.06), 0 1px 3px rgba(31,26,27,.04);
    --shadow-lg:    0 12px 40px rgba(31,26,27,.10), 0 2px 6px rgba(31,26,27,.04);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Poppins','Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.6;
    font-size:15.5px;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3{
    font-family:'Cormorant Garamond',Georgia,serif;
    color:var(--ink);
    font-weight:600;
    letter-spacing:-.015em;
    margin:0;
  }
  .italic-accent{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--taupe);
    font-weight:500;
  }

  .container{
    max-width:680px;
    margin:0 auto;
    padding:24px 22px 56px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ============ BRAND MARK ============ */
  .brand-mark{
    text-align:center;
    margin-bottom:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }
  .brand-mark .logo{
    width:32px;
    height:32px;
    color:var(--taupe);
    flex-shrink:0;
  }
  .brand-mark .name{
    font-family:'Cormorant Garamond',serif;
    font-size:1.05em;
    color:var(--ink);
    line-height:1.05;
    font-weight:600;
    text-align:left;
  }
  .brand-mark .name span{
    display:block;
    font-size:.78em;
    color:var(--ink-soft);
    font-weight:400;
    margin-top:1px;
  }

  /* ============ SCREEN ============ */
  .screen{
    display:none;
    flex:1;
    flex-direction:column;
    animation:fadeIn .4s ease;
  }
  .screen.active{display:flex}
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* ============ HERO ============ */
  .hero{text-align:center;padding-top:14px}
  .hero .pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 18px;
    background:var(--pill);
    border-radius:50px;
    font-size:.78em;
    color:var(--ink);
    font-weight:500;
    margin-bottom:1.6em;
    align-self:center;
  }
  .hero .pill .sparkle{width:13px;height:13px;color:var(--taupe-deep)}
  .hero h1{
    font-size:2.7em;
    line-height:1.05;
    color:var(--ink);
    margin-bottom:.2em;
    font-weight:700;
  }
  .hero h1 em{font-style:italic;color:var(--taupe);font-weight:500}
  .hero .lead{
    font-size:1em;
    line-height:1.6;
    color:var(--ink-soft);
    margin:1em auto 1.8em;
    max-width:520px;
    font-weight:400;
  }

  .types-preview{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    max-width:520px;
    margin:0 auto 1.8em;
  }
  .type-preview{
    background:#fff;
    border-radius:14px;
    padding:14px;
    border:1px solid var(--bg-deep);
    text-align:left;
    display:flex;
    gap:12px;
    align-items:center;
  }
  .type-preview .badge{
    width:54px;
    height:54px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .type-preview .badge svg{width:34px;height:34px}
  .type-preview.E .badge{background:rgba(184,74,98,.13);color:var(--type-e)}
  .type-preview.H .badge{background:rgba(201,154,78,.18);color:var(--type-h)}
  .type-preview.I .badge{background:rgba(61,44,53,.10);color:var(--type-i)}
  .type-preview.R .badge{background:rgba(107,133,81,.16);color:var(--type-r)}
  .type-preview .meta{flex:1;min-width:0}
  .type-preview .meta .name{
    font-family:'Cormorant Garamond',serif;
    font-size:1.1em;
    color:var(--ink);
    font-weight:600;
    line-height:1.1;
    margin-bottom:2px;
  }
  .type-preview .meta .desc{
    font-size:.76em;
    color:var(--ink-soft);
    line-height:1.4;
  }

  .hero .meta-row{
    display:flex;
    justify-content:center;
    gap:24px;
    flex-wrap:wrap;
    font-size:.82em;
    color:var(--ink-soft);
    margin:1em 0 1.6em;
  }
  .hero .meta-row span{display:flex;align-items:center;gap:6px}
  .hero .meta-row b{color:var(--ink);font-weight:600}

  .hero .social-proof{
    font-size:.82em;
    color:var(--ink-soft);
    margin-top:1em;
  }
  .hero .social-proof b{color:var(--ink);font-weight:500}

  /* ============ BUTTON ============ */
  .btn{
    background:var(--sage);
    color:#fff;
    border:none;
    padding:14px 36px;
    border-radius:50px;
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:.95em;
    letter-spacing:.01em;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(107,133,81,.25);
    transition:transform .15s, background .2s, box-shadow .2s;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    align-self:center;
  }
  .btn:hover{background:var(--sage-deep);transform:translateY(-2px);box-shadow:0 6px 20px rgba(107,133,81,.32)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;background:var(--ink-faint)}
  .btn .arrow{display:inline-block;transition:transform .2s}
  .btn:hover .arrow{transform:translateX(3px)}

  /* ============ PROGRESS ============ */
  .top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
    padding:0 4px;
  }
  .progress-text{
    font-size:.7em;
    color:var(--ink-soft);
    letter-spacing:.16em;
    text-transform:uppercase;
    font-weight:500;
  }
  .progress-back{
    background:none;
    border:none;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:.78em;
    padding:6px 10px;
    font-family:'Poppins',sans-serif;
  }
  .progress-back:hover{color:var(--taupe-deep)}
  .progress-bar{
    height:5px;
    background:var(--bg-deep);
    border-radius:3px;
    overflow:hidden;
    margin-bottom:32px;
  }
  .progress-fill{
    height:100%;
    background:var(--sage);
    width:0;
    transition:width .5s ease;
    border-radius:3px;
  }

  /* ============ QUESTION ============ */
  .question .q-eyebrow{
    text-align:center;
    font-size:.7em;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--taupe-deep);
    margin-bottom:.8em;
    font-weight:600;
  }
  .question h2{
    font-size:1.85em;
    line-height:1.2;
    color:var(--ink);
    margin-bottom:.4em;
    text-align:center;
    font-weight:600;
  }
  .question h2 em{font-style:italic;color:var(--taupe);font-weight:500}
  .question .q-helper{
    text-align:center;
    font-size:.88em;
    color:var(--ink-soft);
    margin-bottom:1.6em;
  }

  /* Single Choice */
  .answers{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:520px;
    margin:0 auto;
    width:100%;
  }
  .answer{
    background:#fff;
    border:1px solid var(--bg-deep);
    border-radius:14px;
    padding:15px 20px;
    text-align:left;
    cursor:pointer;
    font-family:'Poppins',sans-serif;
    font-size:.96em;
    color:var(--ink);
    line-height:1.4;
    transition:all .2s;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .answer:hover{
    border-color:var(--taupe);
    background:#fff;
    transform:translateX(4px);
    box-shadow:var(--shadow);
  }
  .answer .a-text{flex:1;display:flex;flex-direction:column;gap:3px}
  .answer .a-text .a-hint{
    font-size:.82em;
    color:var(--ink-soft);
    font-weight:300;
  }

  /* Image Grid */
  .image-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    max-width:520px;
    margin:0 auto;
  }
  .image-card{
    background:#fff;
    border:1px solid var(--bg-deep);
    border-radius:16px;
    padding:18px 16px 18px;
    cursor:pointer;
    text-align:center;
    transition:all .2s;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    font-family:'Poppins',sans-serif;
  }
  .image-card:hover{
    border-color:var(--taupe);
    transform:translateY(-3px);
    box-shadow:var(--shadow-lg);
  }
  .image-card .ic-visual{
    width:78px;
    height:78px;
    border-radius:50%;
    background:var(--bg-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:2px;
  }
  .image-card .ic-visual svg{width:42px;height:42px}
  .image-card .ic-title{
    font-family:'Cormorant Garamond',serif;
    font-size:1.18em;
    color:var(--ink);
    font-weight:600;
    line-height:1.2;
  }
  .image-card .ic-desc{
    font-size:.82em;
    color:var(--ink-soft);
    line-height:1.4;
    font-weight:300;
  }

  /* Slider */
  .slider-wrap{
    max-width:520px;
    margin:0 auto;
    width:100%;
    text-align:center;
  }
  .slider-value{
    font-family:'Cormorant Garamond',serif;
    font-size:4.4em;
    color:var(--taupe);
    line-height:1;
    margin-bottom:.05em;
    font-weight:500;
    font-style:italic;
  }
  .slider-label{
    font-size:1em;
    color:var(--ink);
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    margin-bottom:1.6em;
    min-height:1.5em;
    font-weight:500;
  }
  .range-input{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    height:6px;
    background:var(--bg-deep);
    border-radius:6px;
    outline:none;
    margin-bottom:14px;
  }
  .range-input::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:28px;
    height:28px;
    border-radius:50%;
    background:var(--sage);
    border:3px solid #fff;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(107,133,81,.3);
    transition:transform .1s;
  }
  .range-input::-webkit-slider-thumb:hover{transform:scale(1.15)}
  .range-input::-moz-range-thumb{
    width:24px;
    height:24px;
    border-radius:50%;
    background:var(--sage);
    border:3px solid #fff;
    cursor:pointer;
  }
  .range-edges{
    display:flex;
    justify-content:space-between;
    font-size:.76em;
    color:var(--ink-soft);
    margin-bottom:2em;
  }

  /* Multi-Select */
  .multi-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    max-width:520px;
    margin:0 auto 1.6em;
  }
  .multi-card{
    background:#fff;
    border:1px solid var(--bg-deep);
    border-radius:12px;
    padding:13px 16px;
    cursor:pointer;
    font-size:.9em;
    color:var(--ink);
    line-height:1.4;
    transition:all .2s;
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Poppins',sans-serif;
    text-align:left;
  }
  .multi-card .check{
    width:20px;
    height:20px;
    border-radius:5px;
    border:1.5px solid var(--bg-deep);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    transition:all .2s;
  }
  .multi-card.selected{
    border-color:var(--sage);
    background:var(--sage-soft);
  }
  .multi-card.selected .check{
    background:var(--sage);
    border-color:var(--sage);
  }
  .multi-card.selected .check::after{
    content:'';
    width:5px;
    height:9px;
    border:solid #fff;
    border-width:0 2px 2px 0;
    transform:rotate(45deg) translate(-1px,-1px);
  }
  .multi-card:hover{
    border-color:var(--taupe);
  }
  .multi-helper{
    text-align:center;
    font-size:.8em;
    color:var(--ink-soft);
    margin-top:1em;
  }

  /* Name Input */
  .name-screen{
    text-align:center;
    padding-top:30px;
  }
  .name-screen .greet-icon{
    width:60px;
    height:60px;
    margin:0 auto 1em;
    color:var(--taupe);
  }
  .name-screen h2{
    font-size:2em;
    color:var(--ink);
    margin-bottom:.4em;
    font-weight:600;
  }
  .name-screen h2 em{font-style:italic;color:var(--taupe);font-weight:500}
  .name-screen .lead{
    font-size:1em;
    color:var(--ink-soft);
    margin:.6em auto 1.6em;
    max-width:440px;
    line-height:1.6;
  }
  .input-field{
    width:100%;
    max-width:380px;
    padding:14px 22px;
    border:1px solid var(--bg-deep);
    border-radius:50px;
    font-size:.96em;
    font-family:'Poppins',sans-serif;
    background:#fff;
    color:var(--ink);
    margin-bottom:14px;
    text-align:center;
    transition:border-color .2s, box-shadow .2s;
  }
  .input-field:focus{
    outline:none;
    border-color:var(--sage);
    box-shadow:0 0 0 3px var(--sage-soft);
  }

  /* Interludes */
  .interlude{
    text-align:center;
    padding:30px 0;
  }
  .interlude .stat-big{
    font-family:'Cormorant Garamond',serif;
    font-size:5.5em;
    color:var(--taupe);
    line-height:.95;
    font-style:italic;
    font-weight:500;
    margin-bottom:.1em;
  }
  .interlude .stat-label{
    font-family:'Cormorant Garamond',serif;
    font-size:1.45em;
    color:var(--ink);
    line-height:1.3;
    max-width:480px;
    margin:.4em auto 1.6em;
    font-weight:500;
  }
  .interlude .stat-label em{font-style:italic;color:var(--taupe)}
  .interlude .stat-sub{
    color:var(--ink-soft);
    font-size:.94em;
    max-width:440px;
    margin:0 auto 2em;
    line-height:1.6;
  }
  .interlude .stat-sub b{color:var(--ink);font-weight:600}

  .testimonial{
    background:#fff;
    border-radius:18px;
    padding:24px 26px;
    box-shadow:var(--shadow);
    max-width:520px;
    margin:0 auto 1.6em;
    text-align:left;
    border-left:3px solid var(--taupe);
  }
  .testimonial .quote{
    font-family:'Cormorant Garamond',serif;
    font-size:1.18em;
    color:var(--ink);
    line-height:1.5;
    font-style:italic;
    margin-bottom:.8em;
    font-weight:500;
  }
  .testimonial .author{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:.84em;
    color:var(--ink-soft);
  }
  .testimonial .avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    background:var(--bg-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--taupe-deep);
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:600;
    font-size:1em;
    flex-shrink:0;
  }
  .testimonial .author b{color:var(--ink);font-weight:600}

  /* Loading */
  .loading{
    text-align:center;
    padding:60px 20px;
  }
  .loading h2{
    font-size:1.7em;
    color:var(--ink);
    margin-bottom:1em;
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
  }
  .loading h2 em{font-style:italic;color:var(--taupe);font-weight:500}
  .loader-ring{
    width:64px;
    height:64px;
    border:3px solid var(--bg-deep);
    border-top:3px solid var(--sage);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 1.6em;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-cycle{
    color:var(--ink-soft);
    font-style:italic;
    font-family:'Cormorant Garamond',serif;
    font-size:1.2em;
    min-height:1.6em;
    transition:opacity .4s;
    font-weight:500;
  }
  .loading-progress{
    max-width:300px;
    margin:1.6em auto 0;
    height:4px;
    background:var(--bg-deep);
    border-radius:3px;
    overflow:hidden;
  }
  .loading-progress-fill{
    height:100%;
    background:var(--sage);
    width:0;
    transition:width 4s linear;
    border-radius:3px;
  }
  .loading-quote{
    margin-top:2.4em;
    padding:18px 22px;
    background:#fff;
    border-radius:14px;
    max-width:440px;
    margin-left:auto;
    margin-right:auto;
    font-size:.92em;
    color:var(--ink);
    font-style:italic;
    line-height:1.55;
    font-family:'Cormorant Garamond',serif;
    border-left:3px solid var(--taupe);
    text-align:left;
  }
  .loading-quote .src{
    display:block;
    margin-top:8px;
    font-size:.78em;
    color:var(--ink-soft);
    font-style:normal;
    letter-spacing:.05em;
    font-family:'Poppins',sans-serif;
    font-weight:500;
  }

  /* Email Gate */
  .email-screen{text-align:center;padding-top:24px}
  .email-screen .gate-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 18px;
    background:var(--sage-soft);
    border-radius:50px;
    font-size:.78em;
    color:var(--sage-deep);
    font-weight:500;
    margin-bottom:1.4em;
    align-self:center;
  }
  .email-screen .gate-pill .sparkle{width:13px;height:13px;color:var(--sage)}
  .email-screen h1{
    font-size:2.2em;
    color:var(--ink);
    margin-bottom:.4em;
    font-weight:700;
  }
  .email-screen h1 em{font-style:italic;color:var(--taupe);font-weight:500}
  .email-screen .lead{
    color:var(--ink-soft);
    font-size:1em;
    margin:.5em auto 1.4em;
    max-width:480px;
    line-height:1.6;
  }
  .email-form{max-width:420px;margin:0 auto;width:100%}
  .email-form .input-field{
    text-align:left;
    max-width:none;
    width:100%;
  }
  .email-form .btn{width:100%;justify-content:center;margin-top:6px}
  .privacy{
    font-size:.78em;
    color:var(--ink-soft);
    margin-top:1.2em;
    line-height:1.5;
  }
  .privacy a{color:var(--taupe-deep);text-decoration:underline}
  .bonus-callout{
    background:var(--bg-soft);
    border-radius:14px;
    padding:14px 18px;
    margin:1.2em auto 1em;
    max-width:440px;
    text-align:left;
    border-left:3px solid var(--taupe);
    display:flex;
    gap:12px;
    align-items:center;
  }
  .bonus-callout .gift-icon{
    width:30px;
    height:30px;
    color:var(--taupe-deep);
    flex-shrink:0;
  }
  .bonus-callout strong{

let multiSelected = new Set();

function $app(){ return document.getElementById('app'); }

function totalQuestionSteps(){
  return STEPS.filter(s => ['single','image','slider','multi'].includes(s.type)).length;
}
function currentQuestionIndex(){
  let count = 0;
  for (let i = 0; i <= state.step; i++) {
    if (['single','image','slider','multi'].includes(STEPS[i]?.type)) count++;
  }
  return count;
}

function progressBar(){
  const total = totalQuestionSteps();
  const done = currentQuestionIndex();
  const pct = Math.min(100, (done / total) * 100);
  return `
    <div class="top-bar">
      ${state.step > 1 ? `<button class="progress-back" onclick="goBack()">← zurück</button>` : '<span></span>'}
      <span class="progress-text">Frage ${done} von ${total}</span>
      <span style="width:60px"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  `;
}

function personalize(text){
  if (!text) return '';
  return text.replace(/\{name\}/g, state.user.name || '');
}

function next(){
  state.step++;
  render();
}
function goBack(){
  if (state.step > 0) {
    state.step = Math.max(0, state.step - 1);
    render();
  }
}
function submitName(e){
  e.preventDefault();
  state.user.name = document.getElementById('name-input').value.trim();
  next();
}
function selectSingle(i){
  const s = STEPS[state.step];
  applyScores(s.options[i].scores);
  state.answers.push({ step: state.step, choice: i });
  setTimeout(next, 200);
}
function updateSlider(){
  const s = STEPS[state.step];
  const v = parseInt(document.getElementById('slider-input').value);
  document.getElementById('slider-value').textContent = v;
  document.getElementById('slider-label').textContent = s.labels[v] || '';
}
function submitSlider(){
  const s = STEPS[state.step];
  const v = parseInt(document.getElementById('slider-input').value);
  applyScores(s.scoreFn(v));
  state.answers.push({ step: state.step, value: v });
  next();
}
function toggleMulti(idx){
  const card = document.querySelector(`.multi-card[data-idx="${idx}"]`);
  if (multiSelected.has(idx)) {
    multiSelected.delete(idx);
    card.classList.remove('selected');
  } else {
    multiSelected.add(idx);
    card.classList.add('selected');
  }
  document.getElementById('multi-submit').disabled = multiSelected.size === 0;
  document.getElementById('multi-helper').textContent =
    multiSelected.size === 0 ? 'Wähle mindestens eine Antwort.' : `${multiSelected.size} ausgewählt`;
}
function submitMulti(){
  const s = STEPS[state.step];
  multiSelected.forEach(idx => applyScores(s.options[idx].scores));
  state.answers.push({ step: state.step, choices: Array.from(multiSelected) });
  next();
}
function applyScores(scores){
  if (!scores) return;
  for (const [k, v] of Object.entries(scores)) {
    state.scores[k] = (state.scores[k] || 0) + v;
  }
}
function submitEmail(e){
  e.preventDefault();
  state.user.email = document.getElementById('user-email').value.trim();

  // Compute winner now so loading + result are ready
  state.user.winner = Object.entries(state.scores).sort((a,b)=> b[1]-a[1])[0][0];

  /* ============================================================
     >>> INTEGRATIONS-PUNKT FÜR EUREN E-MAIL-ANBIETER <<<
     ============================================================
     Hier eure echte E-Mail-Integration einbauen. Beispiele:

     – ConvertKit (Kit), ActiveCampaign, Brevo, Klaviyo:
       fetch('YOUR_ENDPOINT', {
         method:'POST',
         headers:{'Content-Type':'application/json'},
         body: JSON.stringify({
           email: state.user.email,
           first_name: state.user.name,
           tags:[`Quiz_Typ_${state.user.winner}`]
         })
       });

     Tags „Quiz_Typ_E", „Quiz_Typ_H", „Quiz_Typ_I", „Quiz_Typ_R"
     ermöglichen typ-spezifische E-Mail-Sequenzen.
     ============================================================ */
  console.log('[Quiz] Lead:', state.user, '· Typ:', state.user.winner, '· Scores:', state.scores);

  next();
}
function goToMasterclass(){
  /* >>> Hier eure Salespage- oder Warteliste-URL einsetzen <<< */
  window.location.href = '#warteliste';
}

/* ============================================================
   ROUTER
   ============================================================ */
function render(){
  const s = STEPS[state.step];
  if (!s) return;
  switch (s.type) {
    case 'hero':       return renderHero();
    case 'name':       return renderName();
    case 'single':     return renderSingle(s);
    case 'image':      return renderImage(s);
    case 'slider':     return renderSlider(s);
    case 'multi':      return renderMulti(s);
    case 'interlude':  return renderInterlude(s);
    case 'email':      return renderEmail();
    case 'loading':    return renderLoading();
    case 'result':     return renderResult();
  }
  window.scrollTo({ top:0, behavior:'smooth' });
}
render();
</script>
